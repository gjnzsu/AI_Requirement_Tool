name: CD -- Deploy to GKE

on:
  workflow_run:
    workflows: ["CI -- Build, Test & Push"]
    types: [completed]
    branches: [main]

env:
  GCP_REGION: us-central1
  GKE_CLUSTER: helloworld-cluster
  IMAGE_NAME: ai-requirement-tool
  REGISTRY_REPO: ai-requirement-tool

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set image in deployment manifest
        run: |
          IMAGE_BASE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REGISTRY_REPO }}/${{ env.IMAGE_NAME }}
          FULL_IMAGE=${IMAGE_BASE}:${{ github.event.workflow_run.head_sha }}
          sed -i "s|IMAGE_PLACEHOLDER|${FULL_IMAGE}|g" k8s/deployment.yaml

      - name: Apply deployment and service
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/prometheus-deployment.yaml
          kubectl apply -f k8s/grafana-deployment.yaml
          kubectl apply -f k8s/grafana-service.yaml
          kubectl apply -f k8s/grafana-dashboard.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ai-tool --timeout=120s

      - name: Print external IP
        run: |
          echo "Waiting for LoadBalancer external IP..."
          for i in $(seq 1 12); do
            EXTERNAL_IP=$(kubectl get service ai-tool-service \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "Service is available at: http://${EXTERNAL_IP}/"
              break
            fi
            echo "Attempt $i/12: IP not yet assigned, waiting 10s..."
            sleep 10
          done
          if [ -z "$EXTERNAL_IP" ]; then
            echo "External IP not assigned within timeout. Check: kubectl get svc"
          fi

      - name: Smoke test -- verify app and metrics pipeline
        run: |
          EXTERNAL_IP=$(kubectl get service ai-tool-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          echo "=== 1. Health endpoint ==="
          curl -sf http://${EXTERNAL_IP}/api/health | grep -q 'ok\|healthy\|status' \
            && echo "OK: /api/health responded" \
            || { echo "FAIL: /api/health did not respond"; exit 1; }

          echo "=== 2. Create smoke-test user ==="
          kubectl exec deploy/ai-tool -- python3 -c "import sys; sys.path.insert(0,'/app'); from src.auth.user_service import UserService; us=UserService(); u=us.get_user_by_username('smoketest'); us.update_password(u['id'],'smoketest123') if u else us.create_user('smoketest','smoketest@ci.local','smoketest123'); print('ready')"

          echo "=== 3. Login to get JWT token ==="
          TOKEN=$(curl -s -X POST http://${EXTERNAL_IP}/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"smoketest","password":"smoketest123"}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: Could not obtain auth token"
            exit 1
          fi
          echo "OK: Auth token obtained"

          echo "=== 4. Trigger a chat request to exercise LLM metrics ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://${EXTERNAL_IP}/api/chat \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -d '{"message":"ping","conversation_id":"smoke-test-deploy"}')
          echo "Chat endpoint returned HTTP ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "FAIL: /api/chat returned ${HTTP_STATUS}"
            exit 1
          fi

          echo "=== 5. Wait for Prometheus scrape cycle (35s) ==="
          sleep 35

          echo "=== 6. Assert http_requests_total is non-zero ==="
          COUNT=$(kubectl exec deploy/prometheus -- \
            wget -qO- 'http://localhost:9090/api/v1/query?query=http_requests_total' \
            | grep -o '"result":\[.' | grep -v '\[\]' | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "FAIL: http_requests_total has no data in Prometheus"
            exit 1
          fi
          echo "OK: http_requests_total is being recorded"

          echo "=== 7. Check llm_tokens_total (informational) ==="
          LLM_COUNT=$(kubectl exec deploy/prometheus -- \
            wget -qO- 'http://localhost:9090/api/v1/query?query=llm_tokens_total' \
            | grep -o '"result":\[.' | grep -v '\[\]' | wc -l)
          if [ "$LLM_COUNT" -eq 0 ]; then
            echo "WARN: llm_tokens_total has no data yet (may populate on first real user request)"
          else
            echo "OK: llm_tokens_total is being recorded"
          fi

          echo "=== Smoke test PASSED ==="
