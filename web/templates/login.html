<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CHAT A.I+</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-stage">
        <section class="auth-card panel">
            <span class="section-label">Secure Access</span>

            <div class="login-header">
                <h1>CHAT A.I+</h1>
                <p>Sign in to continue your requirement workflow in a cleaner, more focused workspace.</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group field">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i>
                        <span>Username</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input
                            type="text"
                            id="username"
                            class="form-input"
                            placeholder="Enter your username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="form-group field">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i>
                        <span>Password</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                </button>
            </form>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        if (auth.isAuthenticated()) {
            window.location.href = '/';
        }

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<span class="loading-spinner"></span>Signing in...';
            errorMessage.classList.remove('show');

            try {
                const success = await auth.login(username, password);

                if (success) {
                    const token = localStorage.getItem('chatbot_auth_token');
                    console.log('[Login] Token verified before redirect:', token ? token.substring(0, 20) + '...' : 'MISSING');

                    await new Promise(resolve => setTimeout(resolve, 100));
                    window.location.href = '/';
                } else {
                    showError('Invalid username or password');
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'Sign In';
                }
            } catch (error) {
                showError(error.message || 'An error occurred. Please try again.');
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Sign In';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
