apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  ai-tool.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["ai-tool", "gmp"],
      "title": "AI Requirement Tool",
      "uid": "ai-tool-gmp",
      "version": 1,
      "panels": [
        {
          "datasource": {"type": "stackdriver"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "stackdriver"},
              "refId": "A",
              "queryType": "metrics",
              "metricKind": "CUMULATIVE",
              "metricType": "prometheus.googleapis.com/http_requests_total/counter",
              "crossSeriesReducer": "REDUCE_SUM",
              "perSeriesAligner": "ALIGN_RATE",
              "alignmentPeriod": "cloud-monitoring-auto",
              "filters": [],
              "groupBys": ["metric.labels.endpoint", "metric.labels.status"]
            }
          ],
          "title": "HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "stackdriver"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "stackdriver"},
              "refId": "A",
              "queryType": "metrics",
              "metricKind": "CUMULATIVE",
              "metricType": "prometheus.googleapis.com/llm_tokens_total/counter",
              "crossSeriesReducer": "REDUCE_SUM",
              "perSeriesAligner": "ALIGN_RATE",
              "alignmentPeriod": "cloud-monitoring-auto",
              "filters": [],
              "groupBys": ["metric.labels.provider", "metric.labels.model", "metric.labels.type"]
            }
          ],
          "title": "LLM Token Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "stackdriver"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "stackdriver"},
              "refId": "A",
              "queryType": "metrics",
              "metricKind": "CUMULATIVE",
              "metricType": "prometheus.googleapis.com/llm_errors_total/counter",
              "crossSeriesReducer": "REDUCE_SUM",
              "perSeriesAligner": "ALIGN_RATE",
              "alignmentPeriod": "cloud-monitoring-auto",
              "filters": [],
              "groupBys": ["metric.labels.provider"]
            }
          ],
          "title": "LLM Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "stackdriver"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "currencyUSD"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {
            "legend": {"calcs": ["sum"], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "stackdriver"},
              "refId": "A",
              "queryType": "metrics",
              "metricKind": "CUMULATIVE",
              "metricType": "prometheus.googleapis.com/llm_token_cost_usd_total/counter",
              "crossSeriesReducer": "REDUCE_SUM",
              "perSeriesAligner": "ALIGN_RATE",
              "alignmentPeriod": "cloud-monitoring-auto",
              "filters": [],
              "groupBys": ["metric.labels.provider", "metric.labels.model"]
            }
          ],
          "title": "LLM Cost Rate (USD/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "stackdriver"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "s"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean", "p95"], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "stackdriver"},
              "refId": "A",
              "queryType": "metrics",
              "metricKind": "CUMULATIVE",
              "metricType": "prometheus.googleapis.com/http_request_duration_seconds/histogram",
              "crossSeriesReducer": "REDUCE_MEAN",
              "perSeriesAligner": "ALIGN_DELTA",
              "alignmentPeriod": "cloud-monitoring-auto",
              "filters": [],
              "groupBys": ["metric.labels.endpoint"]
            }
          ],
          "title": "HTTP Request Latency (mean)",
          "type": "timeseries"
        }
      ]
    }
