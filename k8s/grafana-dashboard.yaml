apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards/json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  ai-tool.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["ai-tool", "prometheus"],
      "title": "AI Requirement Tool",
      "uid": "ai-tool-prometheus",
      "version": 1,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "A",
              "expr": "rate(http_requests_total[2m])",
              "legendFormat": "{{method}} {{endpoint}} {{status}}"
            }
          ],
          "title": "HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "A",
              "expr": "rate(llm_tokens_total[2m])",
              "legendFormat": "{{provider}} {{model}} {{type}}"
            }
          ],
          "title": "LLM Token Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {
            "legend": {"calcs": [], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "A",
              "expr": "rate(llm_errors_total[2m])",
              "legendFormat": "{{provider}} {{error_type}}"
            }
          ],
          "title": "LLM Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "currencyUSD"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {
            "legend": {"calcs": ["sum"], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "A",
              "expr": "rate(llm_token_cost_usd_total[2m])",
              "legendFormat": "{{provider}} {{model}}"
            }
          ],
          "title": "LLM Cost Rate (USD/s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "s"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 5,
          "options": {
            "legend": {"calcs": ["mean"], "displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le, endpoint))",
              "legendFormat": "p95 {{endpoint}}"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "refId": "B",
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[2m])) by (le, endpoint))",
              "legendFormat": "p50 {{endpoint}}"
            }
          ],
          "title": "HTTP Request Latency (p50 / p95)",
          "type": "timeseries"
        }
      ]
    }
