apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - ai-tool
              topologyKey: kubernetes.io/hostname
      containers:
        - name: celery-worker
          image: IMAGE_PLACEHOLDER
          command:
            - celery
            - -A
            - src.async_jobs.celery_app:celery_app
            - worker
            - --loglevel=INFO
          env:
            - name: FLASK_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://redis-service:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis-service:6379/0"
            - name: ASYNC_COZE_ENABLED
              value: "true"
            - name: COZE_ENABLED
              value: "true"
            - name: COZE_API_BASE_URL
              value: "https://api.coze.cn"
            - name: COZE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: COZE_API_TOKEN
            - name: COZE_BOT_ID
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: COZE_BOT_ID
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ai-tool-data-pvc
