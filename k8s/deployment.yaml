apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tool
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-tool
  template:
    metadata:
      labels:
        app: ai-tool
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-tool
          image: IMAGE_PLACEHOLDER
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ "${USE_FASTAPI_BACKEND}" = "true" ]; then
                exec uvicorn src.fastapi_app.app:create_fastapi_app --factory --host 0.0.0.0 --port 5000
              fi
              exec gunicorn --bind 0.0.0.0:5000 --worker-class gthread --threads 4 --workers 2 --keep-alive 30 --timeout 360 app:app
          ports:
            - containerPort: 5000
          env:
            - name: LLM_PROVIDER
              value: "openai"
            - name: FLASK_ENV
              value: "production"
            - name: USE_FASTAPI_BACKEND
              value: "false"
            - name: FASTAPI_PARITY_STRICT
              value: "true"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: OPENAI_API_KEY
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: DEEPSEEK_API_KEY
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: JIRA_API_TOKEN
            - name: JIRA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: JIRA_EMAIL
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: JIRA_URL
            - name: JIRA_PROJECT_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: JIRA_PROJECT_KEY
            - name: CONFLUENCE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: CONFLUENCE_URL
            - name: CONFLUENCE_SPACE_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: CONFLUENCE_SPACE_KEY
            - name: COZE_ENABLED
              value: "true"
            - name: COZE_API_BASE_URL
              value: "https://api.coze.cn"
            - name: COZE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: COZE_API_TOKEN
            - name: COZE_BOT_ID
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: COZE_BOT_ID
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-tool-secrets
                  key: JWT_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ai-tool-data-pvc
